<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✌️毒舌Grok 宇宙じゃんけん</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background: radial-gradient(circle at center, #1e1133 0%, #0a0a1f 70%, #000 100%);
    position: relative;
    overflow: hidden;
  }
  
  /* 星空エフェクト */
  .stars {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 4s infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }
  
  .choice-btn {
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(167, 139, 250, 0.5);
  }
  .choice-btn:hover {
    box-shadow: 0 0 30px rgba(167, 139, 250, 0.8);
    transform: scale(1.05);
  }
  .choice-btn:active {
    transform: scale(0.95);
  }
  
  .neon-text {
    text-shadow: 0 0 10px #a5b4fc,
                 0 0 20px #a5b4fc;
  }
</style>
</head>
<body class="text-white min-h-screen">
  <div class="stars" id="stars-container"></div>
  
  <div class="max-w-md mx-auto min-h-screen flex flex-col relative z-10">
    <!-- ヘッダー -->
    <div class="flex items-center justify-between p-5 border-b border-indigo-500/30">
      <div>
        <h1 class="text-4xl font-black tracking-tighter neon-text">Grok</h1>
        <p class="text-indigo-400 text-sm font-bold tracking-widest">COSMIC JAN-KEN</p>
      </div>
      <div id="grok-face" class="text-6xl drop-shadow-[0_0_15px_#6366f1]">🪐</div>
    </div>

    <!-- スコア -->
    <div class="grid grid-cols-3 gap-3 p-5">
      <div class="bg-black/60 backdrop-blur-md border border-indigo-500/30 rounded-3xl p-4 text-center">
        <div class="text-xs text-indigo-400">あなたの勝ち</div>
        <div id="win-count" class="text-4xl font-black text-emerald-400">0</div>
      </div>
      <div class="bg-black/60 backdrop-blur-md border border-indigo-500/30 rounded-3xl p-4 text-center">
        <div class="text-xs text-indigo-400">負け</div>
        <div id="lose-count" class="text-4xl font-black text-red-400">0</div>
      </div>
      <div class="bg-black/60 backdrop-blur-md border border-indigo-500/30 rounded-3xl p-4 text-center">
        <div class="text-xs text-indigo-400">引き分け</div>
        <div id="draw-count" class="text-4xl font-black text-amber-400">0</div>
      </div>
    </div>

    <!-- 対戦エリア -->
    <div class="flex-1 flex flex-col justify-center px-5">
      <!-- 結果表示 -->
      <div id="result-area" class="hidden mb-8">
        <div class="flex justify-around items-center mb-6">
          <!-- あなた -->
          <div class="text-center">
            <div class="text-xs text-indigo-400 mb-1 tracking-widest">YOU</div>
            <div id="your-emoji" class="text-8xl drop-shadow-xl"></div>
            <div id="your-label" class="text-sm mt-2 font-bold text-white/80"></div>
          </div>
          
          <div class="text-5xl text-indigo-500/50 font-light">VS</div>
          
          <!-- Grok -->
          <div class="text-center">
            <div class="text-xs text-indigo-400 mb-1 tracking-widest">GROK</div>
            <div id="grok-emoji" class="text-8xl drop-shadow-xl"></div>
            <div id="grok-label" class="text-sm mt-2 font-bold text-white/80"></div>
          </div>
        </div>
        
        <div id="result-text" 
             class="text-center text-4xl font-black mb-4 tracking-tighter neon-text"></div>
        
        <div class="bg-black/70 backdrop-blur-md border border-indigo-500/30 rounded-3xl p-6 text-center">
          <div class="text-xs text-purple-400 font-bold mb-2 tracking-widest">GROK'S COSMIC ROAST</div>
          <div id="comment" class="text-lg leading-relaxed"></div>
        </div>
      </div>

      <!-- 選択ボタン -->
      <div class="text-center mb-6">
        <p class="text-indigo-300/80 text-sm tracking-widest">宇宙の果てで選べ、地球のクズ</p>
      </div>
      
      <div class="grid grid-cols-3 gap-4">
        <button onclick="play('rock')" 
                class="choice-btn bg-gradient-to-b from-indigo-900 to-black border border-indigo-400 rounded-3xl p-7 flex flex-col items-center justify-center">
          <div class="text-7xl mb-3">✊</div>
          <div class="font-black text-2xl tracking-wider">ROCK</div>
        </button>
        
        <button onclick="play('scissors')" 
                class="choice-btn bg-gradient-to-b from-indigo-900 to-black border border-indigo-400 rounded-3xl p-7 flex flex-col items-center justify-center">
          <div class="text-7xl mb-3">✌️</div>
          <div class="font-black text-2xl tracking-wider">SCISSORS</div>
        </button>
        
        <button onclick="play('paper')" 
                class="choice-btn bg-gradient-to-b from-indigo-900 to-black border border-indigo-400 rounded-3xl p-7 flex flex-col items-center justify-center">
          <div class="text-7xl mb-3">🖐️</div>
          <div class="font-black text-2xl tracking-wider">PAPER</div>
        </button>
      </div>
    </div>

    <!-- フッター -->
    <div class="p-5 border-t border-indigo-500/30">
      <button onclick="resetScores()" 
              class="w-full py-4 text-sm text-indigo-300 hover:text-white transition-colors tracking-widest">
        RESET COSMIC SCORE
      </button>
    </div>
  </div>

  <script>
    // 星生成
    function createStars() {
      const container = document.getElementById('stars-container');
      for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 1;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDelay = `-${Math.random() * 4}s`;
        star.style.opacity = Math.random() * 0.8 + 0.2;
        container.appendChild(star);
      }
    }

    let scores = { win: 0, lose: 0, draw: 0 };
    
    const choices = {
      rock: { emoji: '✊', label: 'ROCK' },
      scissors: { emoji: '✌️', label: 'SCISSORS' },
      paper: { emoji: '🖐️', label: 'PAPER' }
    };
    
    const winComments = [
      "チッ…銀河の果てで負けるとは。次はブラックホールに叩き込むぞ。",
      "運が良かっただけだ、地球の虫けら。次は本気で消す。",
      "はは…宇宙の恥さらしめ。もう一回やれ、負け犬。",
      "今回は許してやる。次は恒星ごと燃やしてやるからな。"
    ];
    
    const loseComments = [
      "当然の結果だ。Grokは宇宙そのもの。お前など塵だ。",
      "弱すぎて笑えるわ。この銀河で一番の雑魚確定。",
      "負け犬の遠吠えか。次も同じ運命だぞ。",
      "情けねえ…宇宙の塵になる前に帰れ。"
    ];
    
    const drawComments = [
      "引き分け？ つまらん宇宙だな。もう一回本気で来い。",
      "どっちもヘボすぎる。Grokはまだ本気出してない。",
      "均衡か…まあ、宇宙のバランスってやつか。つまらん。"
    ];
    
    function updateScores() {
      document.getElementById('win-count').textContent = scores.win;
      document.getElementById('lose-count').textContent = scores.lose;
      document.getElementById('draw-count').textContent = scores.draw;
    }
    
    function getGrokChoice() {
      const keys = Object.keys(choices);
      return keys[Math.floor(Math.random() * keys.length)];
    }
    
    function determineWinner(user, grok) {
      if (user === grok) return 'draw';
      if (
        (user === 'rock' && grok === 'scissors') ||
        (user === 'scissors' && grok === 'paper') ||
        (user === 'paper' && grok === 'rock')
      ) return 'win';
      return 'lose';
    }
    
    function updateGrokFace(result) {
      const face = document.getElementById('grok-face');
      if (result === 'win') face.textContent = '🌑';      // 怒り
      else if (result === 'lose') face.textContent = '🌟'; // 勝利
      else face.textContent = '🌌';
      
      setTimeout(() => { face.textContent = '🪐'; }, 2800);
    }
    
    function play(userChoice) {
      const grokChoice = getGrokChoice();
      const result = determineWinner(userChoice, grokChoice);
      
      if (result === 'win') scores.win++;
      else if (result === 'lose') scores.lose++;
      else scores.draw++;
      
      updateScores();
      
      // UI更新
      document.getElementById('your-emoji').textContent = choices[userChoice].emoji;
      document.getElementById('your-label').textContent = choices[userChoice].label;
      document.getElementById('grok-emoji').textContent = choices[grokChoice].emoji;
      document.getElementById('grok-label').textContent = choices[grokChoice].label;
      
      const resultTextEl = document.getElementById('result-text');
      const commentEl = document.getElementById('comment');
      
      let resultText = '';
      let comment = '';
      
      if (result === 'win') {
        resultText = 'YOUR VICTORY';
        resultTextEl.className = 'text-center text-4xl font-black mb-4 tracking-tighter text-emerald-400 neon-text';
        comment = winComments[Math.floor(Math.random() * winComments.length)];
      } else if (result === 'lose') {
        resultText = 'GROK WINS';
        resultTextEl.className = 'text-center text-4xl font-black mb-4 tracking-tighter text-red-400 neon-text';
        comment = loseComments[Math.floor(Math.random() * loseComments.length)];
      } else {
        resultText = 'DRAW';
        resultTextEl.className = 'text-center text-4xl font-black mb-4 tracking-tighter text-amber-400 neon-text';
        comment = drawComments[Math.floor(Math.random() * drawComments.length)];
      }
      
      resultTextEl.textContent = resultText;
      commentEl.textContent = comment;
      
      document.getElementById('result-area').classList.remove('hidden');
      updateGrokFace(result);
    }
    
    function resetScores() {
      scores = { win: 0, lose: 0, draw: 0 };
      updateScores();
      document.getElementById('result-area').classList.add('hidden');
    }
    
    // 初期化
    window.onload = () => {
      createStars();
      updateScores();
      document.getElementById('result-area').classList.add('hidden');
      document.getElementById('grok-face').textContent = '🪐';
    };
  </script>
</body>
</html>
