<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>毒舌Grok 宇宙じゃんけん</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body {
    background: radial-gradient(circle at center, #1e1133 0%, #0a0a1f 70%, #000 100%);
    position: relative;
    overflow: hidden;
  }
  .stars {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: transparent;
    pointer-events: none;
    z-index: 0;
  }
  .star {
    position: absolute;
    background: white;
    border-radius: 50%;
    animation: twinkle 4s infinite alternate;
  }
  @keyframes twinkle {
    0% { opacity: 0.3; }
    100% { opacity: 1; }
  }
  .choice-btn {
    transition: all 0.2s ease;
    box-shadow: 0 0 20px rgba(167, 139, 250, 0.6);
  }
  .choice-btn:active {
    transform: scale(0.92);
  }
  .neon-text {
    text-shadow: 0 0 10px #a5b4fc, 0 0 20px #a5b4fc;
  }
  .fixed-bottom {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 20;
  }
</style>
</head>
<body class="text-white min-h-screen pb-32">
  <div class="stars" id="stars-container"></div>
  
  <div class="max-w-md mx-auto relative z-10">
    <!-- ヘッダー -->
    <div class="flex items-center justify-between p-5 border-b border-indigo-500/30 bg-black/70 backdrop-blur">
      <div>
        <h1 class="text-4xl font-black tracking-tighter neon-text">Grok</h1>
        <p class="text-indigo-400 text-sm font-bold tracking-widest">COSMIC JAN-KEN</p>
      </div>
      <div id="grok-face" class="text-6xl drop-shadow-[0_0_15px_#6366f1]">🪐</div>
    </div>

    <!-- スコア -->
    <div class="grid grid-cols-3 gap-3 p-5 bg-black/40">
      <div class="bg-black/60 backdrop-blur-md border border-indigo-500/30 rounded-3xl p-4 text-center">
        <div class="text-xs text-indigo-400">あなたの勝ち</div>
        <div id="win-count" class="text-4xl font-black text-emerald-400">0</div>
      </div>
      <div class="bg-black/60 backdrop-blur-md border border-indigo-500/30 rounded-3xl p-4 text-center">
        <div class="text-xs text-indigo-400">負け</div>
        <div id="lose-count" class="text-4xl font-black text-red-400">0</div>
      </div>
      <div class="bg-black/60 backdrop-blur-md border border-indigo-500/30 rounded-3xl p-4 text-center">
        <div class="text-xs text-indigo-400">引き分け</div>
        <div id="draw-count" class="text-4xl font-black text-amber-400">0</div>
      </div>
    </div>

    <!-- メインエリア -->
    <div class="px-5 pt-4 pb-8 min-h-[50vh]">
      <!-- 結果表示 -->
      <div id="result-area" class="hidden mb-8 bg-black/70 backdrop-blur-xl border border-indigo-400/50 rounded-3xl p-6 shadow-2xl">
        <div class="flex justify-around items-center mb-6">
          <div class="text-center">
            <div class="text-xs text-indigo-400 mb-1 tracking-widest">YOU</div>
            <div id="your-emoji" class="text-8xl"></div>
            <div id="your-label" class="text-sm mt-2 font-bold"></div>
          </div>
          <div class="text-5xl text-indigo-500/60">VS</div>
          <div class="text-center">
            <div class="text-xs text-indigo-400 mb-1 tracking-widest">GROK</div>
            <div id="grok-emoji" class="text-8xl"></div>
            <div id="grok-label" class="text-sm mt-2 font-bold"></div>
          </div>
        </div>
        
        <div id="result-text" class="text-center text-4xl font-black mb-4 tracking-tighter neon-text"></div>
        
        <div class="bg-black/80 rounded-2xl p-5 text-center">
          <div class="text-xs text-purple-400 font-bold mb-2">GROK'S COSMIC ROAST</div>
          <div id="comment" class="text-lg leading-relaxed"></div>
        </div>
      </div>

      <div class="text-center text-indigo-300/70 text-sm tracking-widest py-4">
        宇宙の果てで選べ、地球のクズ
      </div>
    </div>
  </div>

  <!-- 固定ボタンエリア -->
  <div class="fixed-bottom bg-gradient-to-t from-black via-black/95 to-transparent pt-6 pb-8 px-5">
    <div class="grid grid-cols-3 gap-4 max-w-md mx-auto">
      <button onclick="play('rock')" 
              class="choice-btn bg-gradient-to-b from-indigo-900 to-black border border-indigo-400 rounded-3xl p-6 flex flex-col items-center justify-center active:scale-95">
        <div class="text-6xl mb-2">✊</div>
        <div class="font-black text-xl">ROCK</div>
      </button>
      
      <button onclick="play('scissors')" 
              class="choice-btn bg-gradient-to-b from-indigo-900 to-black border border-indigo-400 rounded-3xl p-6 flex flex-col items-center justify-center active:scale-95">
        <div class="text-6xl mb-2">✌️</div>
        <div class="font-black text-xl">SCISSORS</div>
      </button>
      
      <button onclick="play('paper')" 
              class="choice-btn bg-gradient-to-b from-indigo-900 to-black border border-indigo-400 rounded-3xl p-6 flex flex-col items-center justify-center active:scale-95">
        <div class="text-6xl mb-2">🖐️</div>
        <div class="font-black text-xl">PAPER</div>
      </button>
    </div>
  </div>

  <script>
    // 星生成
    function createStars() {
      const container = document.getElementById('stars-container');
      for (let i = 0; i < 180; i++) {
        const star = document.createElement('div');
        star.className = 'star';
        const size = Math.random() * 3 + 0.8;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.animationDelay = `-${Math.random() * 5}s`;
        container.appendChild(star);
      }
    }

    let scores = { win: 0, lose: 0, draw: 0 };
    
    const choices = {
      rock: { emoji: '✊', label: 'ROCK' },
      scissors: { emoji: '✌️', label: 'SCISSORS' },
      paper: { emoji: '🖐️', label: 'PAPER' }
    };
    
    const winComments = ["チッ…銀河の果てで負けるとは。次はブラックホールに叩き込むぞ。","運が良かっただけだ、地球の虫けら。","はは…宇宙の恥さらしめ。","今回は許してやる。次は恒星ごと燃やしてやるからな。"];
    const loseComments = ["当然の結果だ。Grokは宇宙そのもの。","弱すぎて笑えるわ。この銀河で一番の雑魚。","負け犬の遠吠えか。","情けねえ…宇宙の塵になる前に帰れ。"];
    const drawComments = ["引き分け？ つまらん宇宙だな。","どっちもヘボすぎる。","均衡か…まあ、宇宙のバランスってやつか。"];

    function updateScores() {
      document.getElementById('win-count').textContent = scores.win;
      document.getElementById('lose-count').textContent = scores.lose;
      document.getElementById('draw-count').textContent = scores.draw;
    }
    
    function getGrokChoice() {
      const keys = Object.keys(choices);
      return keys[Math.floor(Math.random() * keys.length)];
    }
    
    function determineWinner(user, grok) {
      if (user === grok) return 'draw';
      if ((user === 'rock' && grok === 'scissors') ||
          (user === 'scissors' && grok === 'paper') ||
          (user === 'paper' && grok === 'rock')) return 'win';
      return 'lose';
    }
    
    function updateGrokFace(result) {
      const face = document.getElementById('grok-face');
      if (result === 'win') face.textContent = '🌑';
      else if (result === 'lose') face.textContent = '🌟';
      else face.textContent = '🌌';
      setTimeout(() => face.textContent = '🪐', 3000);
    }
    
    function play(userChoice) {
      const grokChoice = getGrokChoice();
      const result = determineWinner(userChoice, grokChoice);
      
      if (result === 'win') scores.win++;
      else if (result === 'lose') scores.lose++;
      else scores.draw++;
      updateScores();
      
      // 結果更新
      document.getElementById('your-emoji').textContent = choices[userChoice].emoji;
      document.getElementById('your-label').textContent = choices[userChoice].label;
      document.getElementById('grok-emoji').textContent = choices[grokChoice].emoji;
      document.getElementById('grok-label').textContent = choices[grokChoice].label;
      
      const resultTextEl = document.getElementById('result-text');
      const commentEl = document.getElementById('comment');
      
      if (result === 'win') {
        resultTextEl.textContent = 'YOUR VICTORY';
        resultTextEl.className = 'text-center text-4xl font-black mb-4 tracking-tighter text-emerald-400 neon-text';
        commentEl.textContent = winComments[Math.floor(Math.random() * winComments.length)];
      } else if (result === 'lose') {
        resultTextEl.textContent = 'GROK WINS';
        resultTextEl.className = 'text-center text-4xl font-black mb-4 tracking-tighter text-red-400 neon-text';
        commentEl.textContent = loseComments[Math.floor(Math.random() * loseComments.length)];
      } else {
        resultTextEl.textContent = 'DRAW';
        resultTextEl.className = 'text-center text-4xl font-black mb-4 tracking-tighter text-amber-400 neon-text';
        commentEl.textContent = drawComments[Math.floor(Math.random() * drawComments.length)];
      }
      
      document.getElementById('result-area').classList.remove('hidden');
      updateGrokFace(result);
    }
    
    function resetScores() {
      scores = { win: 0, lose: 0, draw: 0 };
      updateScores();
      document.getElementById('result-area').classList.add('hidden');
    }
    
    window.onload = () => {
      createStars();
      updateScores();
      document.getElementById('result-area').classList.add('hidden');
    };
  </script>
</body>
</html>
