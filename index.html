<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Grok Browser - 毒舌版</title>
  <style>
    body {
      margin: 0; padding: 0; background: #0a0a0a; color: #0f0; font-family: 'Helvetica Neue', sans-serif;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }
    header {
      background: linear-gradient(90deg, #4b0082, #00ff9f); padding: 12px; text-align: center; position: relative;
    }
    .title { font-size: 1.4em; font-weight: bold; text-shadow: 0 0 10px #0f0; }
    .grok-icon {
      position: absolute; right: 15px; top: 12px; font-size: 28px; cursor: pointer;
    }
    #url-bar {
      background: #111; padding: 10px; display: flex; gap: 8px;
    }
    input {
      flex: 1; background: #222; border: 1px solid #0f0; color: #0f0; padding: 10px; border-radius: 999px; font-size: 16px;
    }
    button {
      background: #4b0082; color: #0f0; border: none; padding: 0 20px; border-radius: 999px; font-weight: bold;
    }
    iframe {
      flex: 1; border: none; background: white;
    }
    .comment {
      position: fixed; bottom: 60px; left: 10px; right: 10px; background: rgba(0,0,0,0.85);
      padding: 12px; border-radius: 12px; font-size: 14px; border: 1px solid #0f0; display: none;
    }
    .install-btn {
      position: fixed; bottom: 10px; left: 10px; right: 10px; background: #00ff9f; color: #000;
      text-align: center; padding: 14px; font-weight: bold; border-radius: 999px; display: none;
    }
  </style>
</head>
<body>
  <header>
    <div class="title">🟣 Grok Browser 🟢</div>
    <div class="grok-icon" onclick="toxicComment()">👿</div>
  </header>

  <div id="url-bar">
    <input type="text" id="url" value="https://www.example.com" placeholder="URL or 検索">
    <button onclick="navigate()">毒々GO</button>
  </div>

  <iframe id="browser" src="https://www.example.com"></iframe>

  <div id="comment" class="comment"></div>
  <div id="install" class="install-btn" onclick="addToHome()">📱 ホーム画面に追加（アプリ化）</div>

  <script>
    const toxicComments = [
      "またそんなクソサイト見てるの？笑",
      "お前マジで暇だな…",
      "広告多すぎだろ、これブロックしてやろうか？",
      "Grokが監視してるぞ、変なことすんなよ",
      "このページ、センスなさすぎて目が腐るわ",
      "もっと面白いサイト探せよバカ"
    ];

    function navigate() {
      let url = document.getElementById("url").value.trim();
      if (!url.startsWith("http")) url = "https://" + url;
      document.getElementById("browser").src = url;
      toxicComment();
    }

    function toxicComment() {
      const comment = document.getElementById("comment");
      comment.textContent = toxicComments[Math.floor(Math.random() * toxicComments.length)];
      comment.style.display = "block";
      setTimeout(() => comment.style.display = "none", 3000);
    }

    // ホーム画面追加ボタン（iOS/Android対応簡易）
    function addToHome() {
      alert("「共有」→「ホーム画面に追加」を押せ！\nこれで本物のアプリになるぞ");
    }

    // インストールボタン表示（簡易）
    if ('standalone' in window.navigator || window.matchMedia('(display-mode: standalone)').matches) {
      document.getElementById("install").style.display = "none";
    } else {
      document.getElementById("install").style.display = "block";
    }

    // Enterキー対応
    document.getElementById("url").addEventListener("keypress", e => {
      if (e.key === "Enter") navigate();
    });

    // 初回毒コメント
    setTimeout(toxicComment, 800);
  </script>
</body>
</html>
